<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vượt Ải Tri Thức - Phiên Bản Shiba Cute</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --shiba-orange: #FFA351; 
            --shiba-light: #FFDDA1;  
            --shiba-cream: #FFF5E1;  
            --text-dark: #5C4132;    
            --accent-blue: #88D4D8;  
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            text-align: center; 
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            
            /* Tên file ảnh nền của bạn */
            background: url('shiba.png') no-repeat center center fixed;
            background-size: cover;
            
            position: relative; 
        }

        /* CONTAINER CHÍNH */
        .container { 
            width: 100%;
            max-width: 650px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px 30px; 
            border-radius: 30px; 
            border: 4px solid var(--shiba-light);
            box-shadow: 0 15px 35px rgba(255, 163, 81, 0.15); 
            position: relative; 
            z-index: 1; 
        }

        h1 { 
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--shiba-orange);
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px var(--shiba-cream);
        }
        
        h2 { 
            font-size: 1.3rem; 
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 25px; 
        }

        p {
            font-size: 1rem;
            color: #8c766b;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* BUTTONS (Lựa chọn đáp án) */
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        
        button.option-btn { 
            font-family: 'Nunito', sans-serif;
            padding: 16px; 
            font-size: 1.1rem; 
            font-weight: 800;
            cursor: pointer; 
            border: none; 
            border-radius: 16px; 
            color: #fff; 
            transition: 0.2s; 
            box-shadow: 0 6px 0px rgba(0,0,0,0.1);
        }

        .btn-1 { background-color: var(--shiba-orange); }
        .btn-2 { background-color: var(--accent-blue); }
        .btn-3 { background-color: #FF85A2; }
        .btn-4 { background-color: #FACC2E; }
        
        button.option-btn:hover { 
            transform: translateY(-4px);
            filter: brightness(1.1);
        }

        button.option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.1);
        }

        .action-btn { background-color: var(--shiba-orange); width: 100%; max-width: 300px; margin-top: 20px; }

        /* GIFTS GRID (Hộp quà) */
        .gifts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        
        .gift-box { 
            padding: 20px 10px; 
            font-size: 45px; 
            cursor: pointer; 
            background: var(--shiba-cream);
            border: 3px solid var(--shiba-light);
            color: var(--text-dark); 
            border-radius: 20px; 
            transition: 0.3s; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 120px; 
            text-align: center; 
            box-shadow: 0 6px 0px var(--shiba-light);
        }
        
        .gift-box:hover:not(.disabled) { 
            transform: translateY(-5px); 
            background: #fff;
            border-color: var(--shiba-orange);
            box-shadow: 0 10px 0px var(--shiba-light);
        }
        
        .gift-box.disabled { 
            background: #e9ecef; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none; 
            border-color: #dee2e6;
            opacity: 0.6;
        }
        
        .gift-box.winner { 
            background: var(--shiba-orange); 
            color: white; 
            font-size: 1.2rem; 
            font-weight: 800; 
            transform: scale(1.05); 
            z-index: 10; 
            box-shadow: 0 8px 20px rgba(255, 163, 81, 0.4); 
            border: none;
        }

        /* MEME OVERLAY (DÙNG THẺ VIDEO HTML5) */
        #meme-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(92, 65, 50, 0.9); 
            z-index: 1000; justify-content: center; align-items: center; flex-direction: column; 
            backdrop-filter: blur(5px);
        }
        
        /* CSS cho video Shorts lớn hơn */
        .video-wrapper { 
            height: 92vh; /* Tăng chiều cao lên gần như phủ hết overlay */
            /* aspect-ratio: 9/16; -- Đã loại bỏ để điều chỉnh kích thước lớn hơn */
            width: 60%; /* Tăng chiều rộng để video không bị co lại */
            position: relative; 
            border-radius: 24px; 
            overflow: hidden; 
            pointer-events: none; 
            background: #000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border: 4px solid var(--shiba-orange);
            margin-bottom: 20px; /* Thêm khoảng cách với nút đóng */
        }
        
        /* Đảm bảo video phủ hết wrapper */
        .video-wrapper video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            top: 0; left: 0; 
            z-index: 2; 
        }

        #meme-overlay h2 { 
            color: var(--text-dark); margin-top: 20px; font-size: 1.1rem; font-weight: 800; cursor: pointer; 
            background: var(--shiba-light); padding: 15px 30px; border-radius: 30px; transition: 0.2s; 
            position: absolute; bottom: 3%; z-index: 3; box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }
        #meme-overlay h2:hover { background: var(--shiba-orange); color: white; transform: translateY(-3px); }

        /* --- NÚT FULL SCREEN --- */
        #fullscreen-btn {
            position: fixed; 
            top: 15px; 
            right: 15px; 
            z-index: 1001;
            padding: 10px 15px; 
            font-size: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            border-radius: 12px; 
            background-color: var(--shiba-orange); 
            color: white; 
            border: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); 
            transition: 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        #fullscreen-btn:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1); 
        }

        @media (max-width: 500px) {
            .options { grid-template-columns: 1fr; }
            .gifts-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 1.8rem; }
            .container { padding: 30px 20px; border-radius: 20px; }
            #fullscreen-btn { top: 10px; right: 10px; font-size: 12px; padding: 8px 12px;}
        }
    </style>
</head>
<body>

    <button id="fullscreen-btn" onclick="toggleFullScreen()">🔲 Toàn màn hình</button>

    <div id="quiz-screen" class="container">
        <h1>Vượt Ải Tri Thức</h1>
        <h2 id="question-text">Đang tải câu hỏi...</h2>
        <div class="options" id="options-container"></div>
    </div>

    <div id="gift-screen" class="container" style="display: none;">
        <h1>Phần Thưởng</h1>
        <p>Gâu gâu! Hãy chọn 1 cục xương nhé. Quà sẽ không lặp lại đâu!</p>
        <div class="gifts-grid" id="gifts-container"></div>
    </div>

    <div id="end-screen" class="container" style="display: none;">
        <h1>🎉 Hoàn Thành! 🎉</h1>
        <p>Giỏi quá! Bạn đã trả lời đúng hết và nhận được mọi phần quà.</p>
        <button onclick="location.reload()" class="option-btn action-btn">Chơi lại từ đầu</button>
    </div>

    <div id="meme-overlay">
        <div class="video-wrapper">
            <video id="meme-video" preload="auto" loop playsinline></video>
        </div>
        <h2 onclick="closeMeme()">❌ Đóng</h2>
    </div>

    <script>
        const soundTingTing = new Audio("https://www.myinstants.com/media/sounds/ding-sound-effect_2.mp3");

        // HÀM XỬ LÝ TOÀN MÀN HÌNH
        function toggleFullScreen() {
            const btn = document.getElementById("fullscreen-btn");
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Lỗi khi mở toàn màn hình: ${err.message}`);
                });
                btn.innerHTML = "🔳 Thu nhỏ";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    btn.innerHTML = "🔲 Toàn màn hình";
                }
            }
        }

        document.addEventListener("fullscreenchange", function() {
            const btn = document.getElementById("fullscreen-btn");
            if (!document.fullscreenElement) {
                btn.innerHTML = "🔲 Toàn màn hình";
            }
        });

        // DATA CÂU HỎI
        const questions = [
            { q: "Câu 1: Tìm phương án sai: Theo Hồ Chí Minh, điều kiện để thực hiện đại đoàn kết toàn dân tộc là:", options: ["A. Tôn trọng sự tương đồng của tập thể, tìm điểm khác biệt của cá nhân.", "B. Kế thừa truyền thống yêu nước - nhân nghĩa - đoàn kết.", "C. Có lòng khoan dung, độ lượng với con người.", "D. Có niềm tin vào nhân dân."], correct: 1 },
            { q: "Câu 2: Nguyên tắc hoạt động của Mặt trận là:", options: ["A. Hiệp thương dân chủ", "B. Tập trung", "C. Thống nhất", "D. Tôn trọng ý kiến cá nhânCục tác"], correct: 0 },
            { q: "Câu 3: Đại đoàn kết dân tộc là:", options: ["A. Mục tiêu, nhiệm vụ hàng đầu của cả dân tộc", "B. Mục tiêu, nhiệm vụ hàng đầu của Đảng", "C. Mục tiêu, nhiệm vụ hàng đầu của quần chúng cách mạng", "D. Cả A, B"], correct: 3 },
            { q: "Câu 4: Chọn phương án trả lời đúng theo tư tưởng Hồ Chí Minh về lực lượng chủ yếu của khối đại đoàn kết dân tộc?", options: ["A. Công nhân", "B. Công nhân, nông dân", "C. Học trò, nhà buôn", "D. Công nhân, nông dân, lao động trí óc"], correct: 3 },
            { q: "Câu 5: Chọn phương án trả lời đúng theo tư tưởng Hồ Chí Minh về nguyên tắc ngoại giao:", options: ["A. Phải cứng rắn về nguyên tắc", "B. Phải mềm dẻo về sách lược", "C. Vừa cứng rắn về nguyên tắc, vừa mềm dẻo về sách lược", "D. “Dĩ bất biến, ứng vạn biến”"], correct: 3 },
            { q: "Câu 6: Câu “Một dân tộc không tự lực cánh sinh mà ngồi chờ dân tộc khác giúp thì không xứng đáng được độc lập” của Hồ Chí Minh ra đời năm bao nhiêu:", options: ["A. 1950", "B. 1951", "C. 1952", "D. 1953"], correct: 2 }
        ];

        // QUÀ
        let remainingPrizes = ["Bim bim", "Kẹo mút", "Tràng pháo tay", "Thanh kẹo cao su", "Vở", "Hộp bánh"];
        remainingPrizes = remainingPrizes.sort(() => Math.random() - 0.5);

        // VIDEO MEME MP4 ĐÃ TẢI VỀ MÁY
        const localMemes = ["meme1.mp4", "meme2.mp4", "meme3.mp4", "meme4.mp4"];
        let currentQuestionIndex = 0;

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                document.getElementById("quiz-screen").style.display = "none";
                document.getElementById("end-screen").style.display = "block";
                return;
            }

            const qInfo = questions[currentQuestionIndex];
            document.getElementById("question-text").innerText = qInfo.q;
            
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = ""; 

            qInfo.options.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = `option-btn btn-${index + 1}`; 
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex) {
            const qInfo = questions[currentQuestionIndex];
            if (selectedIndex === qInfo.correct) {
                soundTingTing.currentTime = 0; 
                soundTingTing.play();
                renderGifts();
                document.getElementById("quiz-screen").style.display = "none";
                document.getElementById("gift-screen").style.display = "block";
            } else {
                showMeme(); // Gọi hàm showMeme MP4 mới
            }
        }

        function renderGifts() {
            const giftsContainer = document.getElementById("gifts-container");
            giftsContainer.innerHTML = ""; 
            for (let i = 0; i < 6; i++) {
                const box = document.createElement("div");
                box.className = "gift-box";
                box.innerHTML = "🦴"; 
                box.onclick = () => openGift(box);
                giftsContainer.appendChild(box);
            }
        }

        function openGift(boxElement) {
            if (boxElement.classList.contains("disabled")) return; 
            const prize = remainingPrizes.pop(); 
            boxElement.innerHTML = prize;
            boxElement.classList.add("winner");

            const allBoxes = document.querySelectorAll(".gift-box");
            allBoxes.forEach(b => { if (b !== boxElement) b.classList.add("disabled"); });

            currentQuestionIndex++;
            setTimeout(() => {
                document.getElementById("gift-screen").style.display = "none";
                document.getElementById("quiz-screen").style.display = "block";
                loadQuestion();
            }, 3000);
        }

        // Hiện Video MP4 Local
        function showMeme() {
            const randomVideo = localMemes[Math.floor(Math.random() * localMemes.length)];
            const videoElement = document.getElementById("meme-video");
            
            // Gắn link video mp4 và phát ngay
            videoElement.src = randomVideo;
            document.getElementById("meme-overlay").style.display = "flex";
            videoElement.play();
        }

        // Đóng Meme Video MP4
        function closeMeme() {
            document.getElementById("meme-overlay").style.display = "none";
            const videoElement = document.getElementById("meme-video");
            
            videoElement.pause(); // Dừng phát
            videoElement.src = ""; // Xóa bộ nhớ
        }

        loadQuestion();
    </script>
</body>
</html>
