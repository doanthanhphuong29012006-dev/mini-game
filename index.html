<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vượt Ải Tri Thức</title>

    <link rel="icon" href="media/logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --shiba-orange: #FFA351;
            --shiba-light: #FFDDA1;
            --shiba-cream: #FFF5E1;
            --text-dark: #5C4132;
            --accent-blue: #88D4D8;
        }

        body {
            font-family: 'Nunito', sans-serif;
            text-align: center;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;

            /* ẢNH NỀN CỐ ĐỊNH */
            background: url('media/shiba.png') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        /* CONTAINER CHÍNH */
        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 30px;
            border: 4px solid var(--shiba-light);
            box-shadow: 0 15px 35px rgba(255, 163, 81, 0.15);
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--shiba-orange);
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px var(--shiba-cream);
        }

        h2 {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        p {
            font-size: 1rem;
            color: #8c766b;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* BUTTONS (Lựa chọn đáp án) */
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button.option-btn {
            font-family: 'Nunito', sans-serif;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            border: none;
            border-radius: 16px;
            color: #fff;
            transition: 0.2s;
            box-shadow: 0 6px 0px rgba(0, 0, 0, 0.1);
        }

        .btn-1 {
            background-color: var(--shiba-orange);
        }

        .btn-2 {
            background-color: var(--accent-blue);
        }

        .btn-3 {
            background-color: #FF85A2;
        }

        .btn-4 {
            background-color: #FACC2E;
        }

        button.option-btn:hover {
            transform: translateY(-4px);
            filter: brightness(1.1);
        }

        button.option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px rgba(0, 0, 0, 0.1);
        }

        .action-btn {
            background-color: var(--shiba-orange);
            width: 100%;
            max-width: 300px;
            margin-top: 20px;
        }

        /* GIFTS GRID (Hộp quà) */
        .gifts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .gift-box {
            padding: 20px 10px;
            font-size: 45px;
            cursor: pointer;
            background: var(--shiba-cream);
            border: 3px solid var(--shiba-light);
            color: var(--text-dark);
            border-radius: 20px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            text-align: center;
            box-shadow: 0 6px 0px var(--shiba-light);
        }

        .gift-box:hover:not(.disabled) {
            transform: translateY(-5px);
            background: #fff;
            border-color: var(--shiba-orange);
            box-shadow: 0 10px 0px var(--shiba-light);
        }

        .gift-box.disabled {
            background: #e9ecef;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            border-color: #dee2e6;
            opacity: 0.6;
        }

        .gift-box.winner {
            background: var(--shiba-orange);
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 8px 20px rgba(255, 163, 81, 0.4);
            border: none;
        }

        /* MEME OVERLAY (DÙNG THẺ VIDEO HTML5) */
        #meme-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(92, 65, 50, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(5px);
        }

        /* VIDEO ĐÃ PHÓNG TO HẾT CỠ CHIỀU CAO VÀ RỘNG RA */
        .video-wrapper {
            height: 92vh;
            width: 60%;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            pointer-events: none;
            background: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid var(--shiba-orange);
            margin-bottom: 20px;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        #meme-overlay h2 {
            color: var(--text-dark);
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            background: var(--shiba-light);
            padding: 15px 30px;
            border-radius: 30px;
            transition: 0.2s;
            box-shadow: 0 4px 0px rgba(0, 0, 0, 0.1);
            margin-top: 10px;
        }

        #meme-overlay h2:hover {
            background: var(--shiba-orange);
            color: white;
            transform: translateY(-3px);
        }

        /* --- NÚT ĐIỀU KHIỂN (GÓC TRÊN) --- */
        #music-btn,
        #fullscreen-btn {
            position: fixed;
            top: 15px;
            z-index: 1001;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 12px;
            color: white;
            border: none;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1);
            transition: 0.2s;
            font-family: 'Nunito', sans-serif;
        }

        #music-btn {
            left: 15px;
            background-color: var(--accent-blue);
            color: var(--text-dark);
        }

        #fullscreen-btn {
            right: 15px;
            background-color: var(--shiba-orange);
        }

        #music-btn:hover,
        #fullscreen-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        @media (max-width: 768px) {
            .video-wrapper {
                width: 90%;
                height: 85vh;
            }
        }

        @media (max-width: 500px) {
            .options {
                grid-template-columns: 1fr;
            }

            .gifts-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            h1 {
                font-size: 1.8rem;
            }

            .container {
                padding: 30px 20px;
                border-radius: 20px;
            }

            #music-btn,
            #fullscreen-btn {
                top: 10px;
                font-size: 12px;
                padding: 8px 12px;
            }

            #music-btn {
                left: 10px;
            }

            #fullscreen-btn {
                right: 10px;
            }
        }
    </style>
</head>

<body>
    <audio id="bg-music-player" loop>
        <source src="media/nhac-nen.mp4" type="audio/mp4">
        <source src="media/nhac-nen.mp3" type="audio/mpeg">
    </audio>

    <button id="music-btn" onclick="toggleMusic()">🔇 Nhạc: Tắt</button>
    <button id="fullscreen-btn" onclick="toggleFullScreen()">🔲 Toàn màn hình</button>

    <div id="quiz-screen" class="container">
        <h1>Vượt Ải Tri Thức</h1>
        <h2 id="question-text">Đang tải câu hỏi...</h2>
        <div class="options" id="options-container"></div>
    </div>

    <div id="gift-screen" class="container" style="display: none;">
        <h1>Phần Thưởng</h1>
        <p>Gâu gâu! Hãy chọn 1 cục xương nhé!</p>
        <div class="gifts-grid" id="gifts-container"></div>
    </div>

    <div id="end-screen" class="container" style="display: none;">
        <h1>🎉 Hoàn Thành! 🎉</h1>
        <p>Giỏi quá! Bạn đã trả lời đúng hết và nhận được mọi phần quà.</p>
        <button onclick="location.reload()" class="option-btn action-btn">Chơi lại từ đầu</button>
    </div>

    <div id="meme-overlay">
        <div class="video-wrapper">
            <video id="meme-video" preload="auto" playsinline></video>
        </div>
    </div>

    <script>
        // --- 1. KHAI BÁO ÂM THANH ---
        const soundTingTing = new Audio("https://www.myinstants.com/media/sounds/ding-sound-effect_2.mp3");
        const soundApplause = new Audio("https://www.myinstants.com/media/sounds/crowd-applause.mp3");

        // Nhạc nền (Thay đuôi thành .mp4 nếu bạn xài mp4 nhé)
        // Thay vì tạo mới, ta gọi thẻ đã có trong HTML
        const bgMusic = document.getElementById("bg-music-player");
        bgMusic.volume = 0.6; // Để 0.6 cho nghe rõ hơn xíu
        let isMusicPlaying = false;

        function toggleMusic() {
            const btn = document.getElementById("music-btn");
            if (isMusicPlaying) {
                bgMusic.pause();
                btn.innerHTML = "🔇 Nhạc: Tắt";
            } else {
                // Thêm dòng catch để xem trình duyệt báo lỗi gì nếu không chạy
                bgMusic.play().catch(e => {
                    alert("Lỗi: Không tìm thấy file nhac-nen.mp4 hoặc file bị hỏng!");
                    console.log(e);
                });
                btn.innerHTML = "🎵 Nhạc: Đang phát";
            }
            isMusicPlaying = !isMusicPlaying;
        }

        function toggleFullScreen() {
            const btn = document.getElementById("fullscreen-btn");
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
                btn.innerHTML = "🔳 Thu nhỏ";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    btn.innerHTML = "🔲 Toàn màn hình";
                }
            }
        }

        document.addEventListener("fullscreenchange", function () {
            const btn = document.getElementById("fullscreen-btn");
            if (!document.fullscreenElement) btn.innerHTML = "🔲 Toàn màn hình";
        });

        // --- 3. DỮ LIỆU TRÒ CHƠI ---
        const questions = [
            { q: "Câu 1: Tìm phương án sai: Theo Hồ Chí Minh, điều kiện để thực hiện đại đoàn kết toàn dân tộc là:", options: ["A. Tôn trọng sự tương đồng của tập thể, tìm điểm khác biệt của cá nhân.", "B. Kế thừa truyền thống yêu nước - nhân nghĩa - đoàn kết.", "C. Có lòng khoan dung, độ lượng với con người.", "D. Có niềm tin vào nhân dân."], correct: 0 },
            { q: "Câu 2: Theo Hồ Chí Minh, Mặt trận dân tộc thống nhất phải dựa trên cơ sở:", options: ["A. Đảm bảo lợi ích tối cao của dân tộc, quyền lợi cơ bản của các tầng lớp nhân dân", "B. Đảm bảo quyền lợi cơ bản của công – nông", "C. Đảm bảo lợi ích của nhân dân lao động", "D. Đảm bảo lợi ích tối cao của giai cấp công nhân"], correct: 0 },
            { q: "Câu 3:  Chọn phương án đúng nhất: Trong tư tưởng Hồ Chí Minh, đại đoàn kết dân tộc...", options: ["A. Mục tiêu, nhiệm vụ hàng đầu của cả dân tộc", "B. Là vấn đề quyết định thành công của cách mạng", "C. Là vấn đề cơ bản có ý nghĩa chiến lược, quyết định thành công của cách mạng", "D. Là vấn đề sách lược"], correct: 2 },
            { q: "Câu 4: Để xây dựng khối đại đoàn kết, Hồ Chí Minh đã ví von lòng khoan dung, độ lượng của con người với hình ảnh nào?", options: ["A. Bàn tay có ngón dài, ngón ngắn. ", "B. Sông to, biển rộng thì bao nhiêu nước cũng chứa được. ", "C. Chở thuyền cũng là dân, lật thuyền cũng là dân. ", "D. Cái chén nhỏ, cái đĩa cạn."], correct: 1 },
            { q: "Câu 5: Chọn phương án trả lời đúng theo tư tưởng Hồ Chí Minh về nguyên tắc ngoại giao:", options: ["A. Phải cứng rắn về nguyên tắc", "B. Phải mềm dẻo về sách lược", "C. Vừa cứng rắn về nguyên tắc, vừa mềm dẻo về sách lược", "D. “Dĩ bất biến, ứng vạn biến”"], correct: 3 },
            { q: "Câu 6: Chọn phương án đúng nhất: Luận điểm:<br>“Đoàn kết, đoàn kết, đại đoàn kết<br>Thành công, thành công, đại thành công”<br>của Hồ Chí Minh được trích từ tác phẩm nào?", options: ["A. Bài nói chuyện trong Đại hội thành lập Mặt trận Tổ quốc Việt Nam lần IV", "B. Bài nói chuyện tại Hội nghị mở rộng Uỷ ban Trung ương Mặt trận Tổ quốc Việt Nam", "C. Bài nói chuyện tại Đại hội đại biểu Mặt trận Tổ quốc Việt Nam lần thứ III", "D. Bài nói chuyện tại Đại hội đại biểu Mặt trận Tổ quốc Việt Nam lần thứ II"], correct: 3 }
        ];

        let remainingPrizes = ["Bim bim", "Kẹo mút", "Tràng pháo tay", "Thanh kẹo cao su", "Sổ tay", "Hộp bánh"];
        remainingPrizes = remainingPrizes.sort(() => Math.random() - 0.5);

        // Quản lý Video chống lặp
        const wrongMemes = ["media/meme1.mp4", "media/meme2.mp4", "media/meme3.mp4", "media/meme4.mp4", "media/meme5.mp4", "media/meme6.mp4"]; // Meme khi sai
        const correctMemes = ["media/meme7.mp4", "media/meme8.mp4", "media/meme9.mp4"]; // Meme khi đúng (bạn tải thêm file này vào máy nhé)
        
        let lastPlayedMeme = "";
        let currentQuestionIndex = 0;
        let isLastAnswerCorrect = false;

        // --- 4. LOGIC TRÒ CHƠI ---
        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                document.getElementById("quiz-screen").style.display = "none";
                document.getElementById("end-screen").style.display = "block";
                return;
            }

            const qInfo = questions[currentQuestionIndex];
            // DÙNG innerHTML ĐỂ ĐỌC ĐƯỢC THẺ XUỐNG DÒNG <br>
            document.getElementById("question-text").innerHTML = qInfo.q;

            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";

            qInfo.options.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = `option-btn btn-${index + 1}`;
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById("meme-video").addEventListener('ended', function() {
            closeMeme(); // Tự động gọi hàm đóng màn hình Meme
        });
        }


        function renderGifts() {
            const giftsContainer = document.getElementById("gifts-container");
            giftsContainer.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const box = document.createElement("div");
                box.className = "gift-box";
                box.innerHTML = "🦴";
                box.onclick = () => openGift(box);
                giftsContainer.appendChild(box);
            }
        }

        function openGift(boxElement) {
            if (boxElement.classList.contains("disabled")) return;

            const prize = remainingPrizes.pop();
            boxElement.innerHTML = prize;
            boxElement.classList.add("winner");

            // PHÁT TIẾNG VỖ TAY
            soundApplause.currentTime = 0;
            soundApplause.play();

            const allBoxes = document.querySelectorAll(".gift-box");
            allBoxes.forEach(b => { if (b !== boxElement) b.classList.add("disabled"); });

            currentQuestionIndex++;

            // CHỜ ĐÚNG 3 GIÂY RỒI MỚI CHUYỂN
            setTimeout(() => {
                soundApplause.pause(); // Dừng vỗ tay
                document.getElementById("gift-screen").style.display = "none";
                document.getElementById("quiz-screen").style.display = "block";
                loadQuestion();
            }, 5000);
        }

        function checkAnswer(selectedIndex) {
            const qInfo = questions[currentQuestionIndex];
            if (selectedIndex === qInfo.correct) {
                // TRẢ LỜI ĐÚNG
                soundTingTing.currentTime = 0;
                soundTingTing.play();
                isLastAnswerCorrect = true; // Lưu trạng thái
                showMeme(true); // Truyền true để hiện meme đúng
            } else {
                // TRẢ LỜI SAI
                isLastAnswerCorrect = false; // Lưu trạng thái
                showMeme(false); // Truyền false để hiện meme sai
            }
        }

        function showMeme(isCorrect) {
            const videoElement = document.getElementById("meme-video");
            
            videoElement.volume = 1.0;
            if (typeof isMusicPlaying !== 'undefined' && isMusicPlaying) bgMusic.pause(); 

            if (isCorrect) {
                // XỬ LÝ MEME ĐÚNG (Chỉ đổi link video, không cần đổi chữ nút nữa)
                const randomVideo = correctMemes[Math.floor(Math.random() * correctMemes.length)];
                videoElement.src = randomVideo;
            } else {
                // XỬ LÝ MEME SAI (Chống lặp)
                let availableMemes = wrongMemes.filter(meme => meme !== lastPlayedMeme);
                if (availableMemes.length === 0) availableMemes = wrongMemes;

                const randomVideo = availableMemes[Math.floor(Math.random() * availableMemes.length)];
                lastPlayedMeme = randomVideo; 
                videoElement.src = randomVideo;
            }

            document.getElementById("meme-overlay").style.display = "flex";
            videoElement.play().catch(e => console.log("Trình duyệt chặn auto-play:", e));
        }

        function closeMeme() {
            document.getElementById("meme-overlay").style.display = "none";
            const videoElement = document.getElementById("meme-video");

            videoElement.pause();
            if (typeof isMusicPlaying !== 'undefined' && isMusicPlaying) bgMusic.play();

            // ĐIỀU HƯỚNG SAU KHI ĐÓNG MEME
            if (isLastAnswerCorrect) {
                // Nếu vừa trả lời đúng -> Chuyển sang màn hình chọn quà
                renderGifts();
                document.getElementById("quiz-screen").style.display = "none";
                document.getElementById("gift-screen").style.display = "block";
            }
            // Nếu sai thì không làm gì cả, ở lại màn hình câu hỏi
        }



        // Chạy game
        loadQuestion();
    </script>
</body>

</html>
